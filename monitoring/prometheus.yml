global:
  scrape_interval: 30s
  evaluation_interval: 30s

scrape_configs:
  - job_name: kyrgpulse-api
    static_configs:
      - targets: ["backend:8000"]
    metrics_path: /metrics

  - job_name: postgres-exporter
    static_configs:
      - targets: ["postgres-exporter:9187"]

  - job_name: redis-exporter
    static_configs:
      - targets: ["redis-exporter:9121"]
