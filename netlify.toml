[build]
  base    = "frontend"
  command = "npm ci && npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION            = "20"
  NEXT_TELEMETRY_DISABLED = "1"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[[redirects]]
  from   = "/api/*"
  to     = ":NEXT_PUBLIC_API_URL/:splat"
  status = 200
